<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie App | Classic View</title>
    <style>
        :root {
            --netflix-red: #e50914;
            --black: #000000;
            --dark-gray: #121212;
            --text-gray: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }

        *::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--black);
            color: white;
            overflow-x: hidden;
        }

        /* --- হোম স্ক্রিন হেডার --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 1000;
        }

        .logo {
            color: var(--netflix-red);
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .search-trigger {
            cursor: pointer;
            font-size: 20px;
            color: white;
        }

        #homePage { display: block; padding-bottom: 50px; }

        .hero-banner {
            height: 55vh;
            background: linear-gradient(to top, var(--black), transparent), 
                        url('https://images.alphacoders.com/131/1317070.jpeg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 4%;
        }

        .hero-title { font-size: 2.2rem; margin-bottom: 5px; font-weight: bold; }

        /* মুভি সেকশন স্টাইল */
        .movie-section { padding: 15px 0 10px 4%; }
        .row-title { font-size: 18px; margin-bottom: 12px; font-weight: 600; color: #fff; }

        .movie-grid {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 10px 4% 10px 0;
        }

        .movie-card {
            position: relative;
            flex: 0 0 auto;
            width: 115px;
            height: 165px;
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .movie-card:active, .movie-card:hover {
            transform: scale(1.08);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
            z-index: 10;
        }

        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

        .card-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%);
            display: flex; align-items: flex-end; padding: 8px;
        }

        .movie-name {
            font-size: 11px; color: #ffffff; font-weight: 600; text-align: center; width: 100%;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* --- সার্চ পেজ স্টাইল --- */
        #searchPage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black);
            z-index: 3000;
            padding: 20px;
        }

        .search-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
            background: #222;
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
        }

        .search-input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-size: 16px;
            margin-left: 10px;
        }

        .search-results-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            overflow-y: auto;
            max-height: calc(100vh - 100px);
        }

        .not-found-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding-top: 50px;
            color: var(--text-gray);
            font-size: 16px;
        }

        /* --- ডিটেইলস পেজ --- */
        #detailsPage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black);
            z-index: 2000;
            overflow-y: auto;
        }

        .details-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: 1;
            transition: 0.5s ease;
        }

        #detImg { width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; }

        .img-card-mode { padding: 40px 20px; display: flex; justify-content: center; align-items: flex-start; }
        .img-card-mode #detImg { width: 80%; height: 400px; border: 3px solid white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .img-full-mode { padding: 0; }
        .img-full-mode #detImg { width: 100%; height: 100vh; border: none; border-radius: 0; }

        .scroll-content { position: relative; z-index: 2; padding-top: 500px; }
        .content-inner { background: linear-gradient(to top, var(--black) 90%, transparent); padding: 30px 6%; min-height: 100vh; }
        .det-title { font-size: 32px; font-weight: bold; margin-bottom: 8px; }
        .det-desc { font-size: 14px; color: var(--text-gray); margin-bottom: 20px; line-height: 1.5; }
        #buttonContainer { display: flex; flex-direction: column; gap: 12px; }
        .play-btn { background: white; color: black; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; display: block; width: 100%; }

        @media (min-width: 1024px) {
            .img-card-mode #detImg { width: 350px; height: 500px; }
            .content-inner { width: 50%; }
            .movie-card { width: 160px; height: 230px; }
            .search-results-container { grid-template-columns: repeat(6, 1fr); }
        }
    </style>
</head>
<body>

    <div id="homePage">
        <header>
            <a href="#" class="logo">NETFLIX</a>
            <div class="search-trigger" onclick="openSearch()">🔍</div>
        </header>
        
        <section class="hero-banner">
            <h1 class="hero-title">Bhaggyolokkhi</h1>
            <p style="color: #b3b3b3; font-size: 14px;">Originals • 2025</p>
        </section>

        <div id="movieContainer"></div>
    </div>

    <div id="searchPage">
        <div class="search-header">
            <div class="search-input-wrapper">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="মুভির নাম লিখুন..." oninput="performSearch()">
            </div>
        </div>
        <div class="search-results-container" id="searchResults"></div>
    </div>

    <div id="detailsPage" onscroll="handleScroll(this)">
        <div id="wrapper" class="details-wrapper img-card-mode">
            <img id="detImg" src="" alt="Banner">
        </div>
        <div class="scroll-content">
            <div class="content-inner">
                <h1 id="detTitle" class="det-title"></h1>
                <p id="detDesc" class="det-desc"></p>
                <div id="buttonContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const allMovies = [
            { id: 1, title: 'Pathaan', cat: 'All Movies', img: 'https://via.placeholder.com/150x225?text=Pathaan', desc: 'শাহরুখ খান অভিনীত অ্যাকশন মুভি।', links: [{text: '▶ Play Now', link: '#'}] },
            { id: 2, title: 'Major', cat: 'All Movies', img: 'https://via.placeholder.com/150x225?text=Major', desc: 'একটি সত্য কাহিনী।', links: [{text: '▶ Watch', link: '#'}] },
            { id: 3, title: 'Toofan', cat: 'Bengali', img: 'https://image.tmdb.org/t/p/w500/p69BYYvWUCXNn3xyu09S9m9AyST.jpg', desc: 'অ্যাকশন থ্রিলার মুভি।', links: [{text: '▶ Play Now', link: '#'}] },
            { id: 4, title: 'Raktabeej', cat: 'Bengali', img: 'https://image.tmdb.org/t/p/w500/v9X7RR7p5AL59Y792v6X789Y.jpg', desc: 'একটি রহস্যময় সত্য ঘটনা অবলম্বনে নির্মিত সিনেমা।', links: [{text: '▶ Watch', link: '#'}] },
            { id: 5, title: 'Jawan', cat: 'Hindi', img: 'https://via.placeholder.com/150x225?text=Jawan', desc: 'শাহরুখ খানের সিনেমা।', links: [{text: '▶ Play', link: '#'}] },
            { id: 6, title: 'Animal', cat: 'Hindi', img: 'https://via.placeholder.com/150x225?text=Animal', desc: 'রণবীর কাপুর অভিনীত একটি ইন্টেন্স ড্রামা সিনেমা।', links: [{text: '▶ Play', link: '#'}] },
            { id: 7, title: 'Avengers', cat: 'English', img: 'https://via.placeholder.com/150x225?text=Avengers', desc: 'পৃথিবীর শ্রেষ্ঠ নায়কদের এক হওয়ার গল্প।', links: [{text: '▶ Play', link: '#'}] },
            { id: 8, title: 'Naruto', cat: 'Anime', img: 'https://via.placeholder.com/150x225?text=Naruto', desc: 'এক নিনজা কিশোরের হোকাগে হওয়ার স্বপ্ন।', links: [{text: '▶ Play', link: '#'}] }
        ];

        function renderHome() {
            const container = document.getElementById('movieContainer');
            const categories = [...new Set(allMovies.map(m => m.cat))];
            container.innerHTML = categories.map(cat => `
                <div class="movie-section">
                    <h2 class="row-title">${cat}</h2>
                    <div class="movie-grid">
                        ${allMovies.filter(m => m.cat === cat).map(movie => `
                            <div class="movie-card" onclick="openDetails('${movie.title}', '${movie.img}', '${movie.desc}', ${JSON.stringify(movie.links).replace(/"/g, '&quot;')})">
                                <img src="${movie.img}">
                                <div class="card-overlay"><span class="movie-name">${movie.title}</span></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // নতুন সার্চ লজিক
        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsBox = document.getElementById('searchResults');
            resultsBox.innerHTML = '';
            
            if (query === "") return;

            // ফিল্টার মুভি
            const matches = allMovies.filter(m => m.title.toLowerCase().includes(query));

            // লেটার পজিশন অনুযায়ী সর্ট করা
            matches.sort((a, b) => {
                const aName = a.title.toLowerCase();
                const bName = b.title.toLowerCase();
                
                const aStarts = aName.startsWith(query);
                const bStarts = bName.startsWith(query);

                if (aStarts && !bStarts) return -1; // 'a' উপরে যাবে
                if (!aStarts && bStarts) return 1;  // 'b' উপরে যাবে
                return aName.localeCompare(bName);  // অন্যান্য ক্ষেত্রে বর্ণানুক্রমিকভাবে
            });

            if (matches.length > 0) {
                matches.forEach(movie => {
                    const div = document.createElement('div');
                    div.className = 'movie-card';
                    div.style.width = '100%'; 
                    div.onclick = () => {
                        window.history.back();
                        setTimeout(() => openDetails(movie.title, movie.img, movie.desc, movie.links), 100);
                    };
                    div.innerHTML = `<img src="${movie.img}"><div class="card-overlay"><span class="movie-name">${movie.title}</span></div>`;
                    resultsBox.appendChild(div);
                });
            } else {
                resultsBox.innerHTML = `<div class="not-found-msg">এই মুভিটি খুঁজে পাওয়া যাচ্ছে না, আবার চেষ্টা করুন।</div>`;
            }
        }

        function openSearch() {
            document.getElementById('searchPage').style.display = 'block';
            document.getElementById('searchInput').focus();
            history.pushState({page: 'search'}, "Search", "");
        }

        function openDetails(title, imgUrl, desc, linksArray) {
            document.getElementById('detTitle').innerText = title;
            document.getElementById('detImg').src = imgUrl;
            document.getElementById('detDesc').innerText = desc;
            const btnContainer = document.getElementById('buttonContainer');
            btnContainer.innerHTML = ''; 
            linksArray.forEach(item => {
                const btn = document.createElement('a');
                btn.href = item.link; btn.className = 'play-btn'; btn.innerText = item.text; btn.target = '_blank';
                btnContainer.appendChild(btn);
            });
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('detailsPage').style.display = 'block';
            document.getElementById('wrapper').className = 'details-wrapper img-card-mode';
            document.getElementById('detailsPage').scrollTo(0, 0);
            history.pushState({page: 'details'}, title, "");
        }

        function handleScroll(el) {
            const wrapper = document.getElementById('wrapper');
            if (el.scrollTop > 50) wrapper.className = 'details-wrapper img-full-mode';
            else wrapper.className = 'details-wrapper img-card-mode';
        }

        window.onpopstate = function(event) {
            document.getElementById('detailsPage').style.display = 'none';
            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
        };

        renderHome();
    </script>
</body>
  </html>
