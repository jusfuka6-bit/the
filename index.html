<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie App | Classic View</title>
    <style>
        :root {
            --netflix-red: #e50914;
            --black: #000000;
            --dark-gray: #121212;
            --text-gray: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }

        *::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--black);
            color: white;
            overflow-x: hidden;
        }

        /* --- হোম স্ক্রিন হেডার --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 1000;
        }

        .logo {
            color: var(--netflix-red);
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .header-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }

        .glass-trigger {
            cursor: pointer;
            font-size: 12px;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            white-space: nowrap;
        }

        .glass-trigger:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.95);
        }

        #homePage { display: block; padding-bottom: 50px; }

        .hero-banner {
            height: 55vh;
            background: linear-gradient(to top, var(--black), transparent), 
                        url('https://images.alphacoders.com/131/1317070.jpeg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 4%;
        }

        .hero-title { font-size: 2.2rem; margin-bottom: 5px; font-weight: bold; }

        /* মুভি সেকশন স্টাইল */
        .movie-section { padding: 15px 0 10px 4%; }
        .row-title { 
            font-size: 18px; 
            margin-bottom: 12px; 
            font-weight: 600; 
            color: #fff; 
            display: inline-block;
            cursor: pointer;
        }
        .row-title:active { color: var(--netflix-red); }

        .movie-grid {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 10px 4% 10px 0;
        }

        .movie-card {
            position: relative;
            flex: 0 0 auto;
            width: 115px;
            height: 165px;
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .movie-card:active, .movie-card:hover {
            transform: scale(1.08);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
            z-index: 10;
        }

        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

        .card-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%);
            display: flex; align-items: flex-end; padding: 8px;
        }

        .movie-name {
            font-size: 11px; color: #ffffff; font-weight: 600; text-align: center; width: 100%;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* --- সার্চ ও ক্যাটাগরি পেজ লেআউট --- */
        #searchPage, #categoryPage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black);
            z-index: 3000;
            padding: 20px;
            overflow-y: auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
            background: #222;
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
        }

        .search-input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-size: 16px;
            margin-left: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .not-found-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .not-found-btn {
            background: var(--netflix-red);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        /* --- ডিটেইলস পেজ --- */
        #detailsPage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black);
            z-index: 2000;
            overflow-y: auto;
        }

        .details-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: 1;
            transition: 0.5s ease;
        }

        #detImg { width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; }

        .img-card-mode { padding: 40px 20px; display: flex; justify-content: center; align-items: flex-start; }
        .img-card-mode #detImg { width: 80%; height: 400px; border: 3px solid white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .img-full-mode { padding: 0; }
        .img-full-mode #detImg { width: 100%; height: 100vh; border: none; border-radius: 0; }

        .scroll-content { position: relative; z-index: 2; padding-top: 500px; }
        .content-inner { background: linear-gradient(to top, var(--black) 90%, transparent); padding: 30px 6%; min-height: 100vh; }
        .det-title { font-size: 32px; font-weight: bold; margin-bottom: 8px; }
        .det-desc { font-size: 14px; color: var(--text-gray); margin-bottom: 20px; line-height: 1.5; }
        #buttonContainer { display: flex; flex-direction: column; gap: 12px; }
        .play-btn { background: white; color: black; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; display: block; width: 100%; }

        @media (min-width: 1024px) {
            .img-card-mode #detImg { width: 350px; height: 500px; }
            .content-inner { width: 50%; }
            .movie-card { width: 160px; height: 230px; }
            .grid-container { grid-template-columns: repeat(6, 1fr); }
        }
    </style>
</head>
<body>

    <div id="homePage">
        <header>
            <a href="javascript:void(0)" class="logo" onclick="applyRoute('')">Movie BD</a>
            <div class="header-actions">
                <div class="glass-trigger" onclick="openSearch()">🔍 Search</div>
                <a href="https://jusfuka6-bit.github.io/Movie-Request/" target="_blank" class="glass-trigger">Request</a>
            </div>
        </header>
        
        <section class="hero-banner">
            <h1 class="hero-title">Bhaggyolokkhi</h1>
            <p style="color: #b3b3b3; font-size: 14px;">Originals • 2025</p>
        </section>

        <div id="movieContainer"></div>
    </div>

    <div id="searchPage">
        <div class="page-header">
            <div class="search-input-wrapper">
                <span onclick="applyRoute('')" style="cursor:pointer">🔍</span>
                <input type="text" id="searchInput" placeholder="মুভির নাম লিখুন..." oninput="performSearch()">
            </div>
        </div>
        <div class="grid-container" id="searchResults"></div>
    </div>

    <div id="categoryPage">
        <div class="page-header">
            <h2 id="categoryTitle" style="font-size: 24px;"></h2>
        </div>
        <div class="grid-container" id="categoryResults"></div>
    </div>

    <div id="detailsPage" onscroll="handleScroll(this)">
        <div id="wrapper" class="details-wrapper img-card-mode">
            <img id="detImg" src="" alt="Banner">
        </div>
        <div class="scroll-content">
            <div class="content-inner">
                <h1 id="detTitle" class="det-title"></h1>
                <p id="detDesc" class="det-desc"></p>
                <div id="buttonContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const allMovies = [
            { title: 'Pathaan', cat: ['Popular', 'Hindi'], img: 'https://via.placeholder.com/150x225?text=Pathaan', desc: 'শাহরুখ খান অভিনীত অ্যাকশন মুভি।', links: [{text: '▶ Play Now', link: '#'}] },
            { title: 'Major', cat: ['Popular'], img: 'https://ottbdmovie.wordpress.com/wp-content/uploads/2026/04/mv5bowe4mjg2mzytodczmc00yjuzltg4ndetnzcwngi1njvkyjmwxkeyxkfqcgc40685529906123101576.jpg', desc: 'একটি সত্য কাহিনী।', links: [{text: '▶ Watch', link: '#'}] },
            { 
              title: 'Bachelor Point S5', 
              cat: ['Popular', 'Bengali'], 
              img: 'https://ottbdmovie.wordpress.com/wp-content/uploads/2026/04/wp-17683955308454638501429128093451333111551373222559.jpg', 
              desc: '1080p | Audio: Bangla', 
              links: [{ text: 'Episode 81-88', link: 'https://drive.google.com/file/d/1HKQjSPXz36Z7C8Jt-oqhdwZAT18xd-Uv/view?usp=drivesdk' }, { text: 'Episode 73-80', link: 'https://drive.google.com/file/d/1T9zLJMXPyOLh32cfpo4k8DgC_bFRIU0l/view?usp=drivesdk' }] 
            },
            { title: 'Toofan', cat: ['Bengali'], img: 'https://image.tmdb.org/t/p/w500/p69BYYvWUCXNn3xyu09S9m9AyST.jpg', desc: 'অ্যাকশন থ্রিলার মুভি।', links: [{text: '▶ Play Now', link: '#'}] },
            { title: 'Raktabeej', cat: ['Bengali'], img: 'https://image.tmdb.org/t/p/w500/v9X7RR7p5AL59Y792v6X789Y.jpg', desc: 'একটি রহস্যময় সত্য ঘটনা অবলম্বনে নির্মিত সিনেমা।', links: [{text: '▶ Watch', link: '#'}] },
            { title: 'Jawan', cat: ['Hindi'], img: 'https://via.placeholder.com/150x225?text=Jawan', desc: 'শাহরুখ খানের সিনেমা।', links: [{text: '▶ Play', link: '#'}] },
            { title: 'Animal', cat: ['Hindi'], img: 'https://via.placeholder.com/150x225?text=Animal', desc: 'রণবীর কাপুর অভিনীত একটি ইন্টেন্স ড্রামা সিনেমা।', links: [{text: '▶ Play', link: '#'}] },
            { title: 'Avengers', cat: ['English'], img: 'https://via.placeholder.com/150x225?text=Avengers', desc: 'পৃথিবীর শ্রেষ্ঠ নায়কদের এক হওয়ার গল্প।', links: [{text: '▶ Play', link: '#'}] },
            { title: 'Naruto', cat: ['Anime'], img: 'https://via.placeholder.com/150x225?text=Naruto', desc: 'এক নিনজা কিশোরের হোকাগে হওয়ার স্বপ্ন।', links: [{text: '▶ Play', link: '#'}] }
        ];

        // --- স্মার্ট রাউটিং (PushState) লজিক ---
        function applyRoute(path) {
            const newUrl = window.location.pathname + (path ? '?' + encodeURIComponent(path) : '');
            window.history.pushState(null, "", newUrl);
            checkAndRender();
        }

        function renderHome() {
            const container = document.getElementById('movieContainer');
            const uniqueCategories = [...new Set(allMovies.flatMap(movie => movie.cat))];
            
            container.innerHTML = uniqueCategories.map(cat => `
                <div class="movie-section">
                    <h2 class="row-title" onclick="openCategory('${cat}')">${cat} ›</h2>
                    <div class="movie-grid">
                        ${allMovies.filter(m => m.cat.includes(cat)).map(movie => `
                            <div class="movie-card" onclick="openDetails('${movie.title}')">
                                <img src="${movie.img}">
                                <div class="card-overlay"><span class="movie-name">${movie.title}</span></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function openCategory(catName) { applyRoute(catName); }
        function openSearch() { applyRoute("search"); }
        function openDetails(title) { applyRoute(title); }

        function checkAndRender() {
            const query = decodeURIComponent(window.location.search.substring(1));
            
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('categoryPage').style.display = 'none';
            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('detailsPage').style.display = 'none';

            if (query === "search") {
                document.getElementById('searchPage').style.display = 'block';
                document.getElementById('searchInput').focus();
            } 
            else if (allMovies.some(m => m.title === query)) {
                const movie = allMovies.find(m => m.title === query);
                showDetailsUI(movie);
            } 
            else if (allMovies.some(m => m.cat.includes(query))) {
                showCategoryUI(query);
            } 
            else {
                document.getElementById('homePage').style.display = 'block';
            }
        }

        function showDetailsUI(movie) {
            document.getElementById('detTitle').innerText = movie.title;
            document.getElementById('detImg').src = movie.img;
            document.getElementById('detDesc').innerText = movie.desc;
            const btnContainer = document.getElementById('buttonContainer');
            btnContainer.innerHTML = movie.links.map(item => `<a href="${item.link}" class="play-btn" target="_blank">${item.text}</a>`).join('');
            document.getElementById('detailsPage').style.display = 'block';
            document.getElementById('wrapper').className = 'details-wrapper img-card-mode';
            document.getElementById('detailsPage').scrollTo(0, 0);
        }

        function showCategoryUI(catName) {
            document.getElementById('categoryTitle').innerText = catName;
            const resultsBox = document.getElementById('categoryResults');
            resultsBox.innerHTML = '';
            allMovies.filter(m => m.cat.includes(catName)).forEach(movie => {
                resultsBox.appendChild(createMovieCard(movie));
            });
            document.getElementById('categoryPage').style.display = 'block';
        }

        function createMovieCard(movie) {
            const div = document.createElement('div');
            div.className = 'movie-card';
            div.style.width = '100%'; 
            div.onclick = () => openDetails(movie.title);
            div.innerHTML = `<img src="${movie.img}"><div class="card-overlay"><span class="movie-name">${movie.title}</span></div>`;
            return div;
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsBox = document.getElementById('searchResults');
            resultsBox.innerHTML = '';
            if (query === "") return;

            const matches = allMovies.filter(m => m.title.toLowerCase().includes(query));
            if (matches.length > 0) {
                matches.forEach(movie => resultsBox.appendChild(createMovieCard(movie)));
            } else {
                resultsBox.innerHTML = `<div class="not-found-container"><div class="not-found-msg">মুভিটি খুঁজে পাওয়া যাচ্ছে না!</div><a href="https://jusfuka6-bit.github.io/Movie-Request/" target="_blank" class="not-found-btn">মুভিটি রিকোয়েস্ট করুন</a></div>`;
            }
        }

        function handleScroll(el) {
            const wrapper = document.getElementById('wrapper');
            wrapper.className = el.scrollTop > 50 ? 'details-wrapper img-full-mode' : 'details-wrapper img-card-mode';
        }

        window.onpopstate = checkAndRender;

        renderHome();
        checkAndRender();
    </script>
</body>
</html>
