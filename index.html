<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movie App | Classic View</title>
    <style>
        :root {
            --netflix-red: #e50914;
            --black: #000000;
            --dark-gray: #121212;
            --text-gray: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
            -webkit-tap-highlight-color: transparent;
        }

        *::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--black);
            color: white;
            overflow-x: hidden;
            touch-action: pan-x pan-y;
        }

        /* --- হোম স্ক্রিন হেডার --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 1000;
        }

        .logo {
            color: var(--netflix-red);
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .header-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }

        .glass-trigger {
            cursor: pointer;
            font-size: 12px;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            white-space: nowrap;
        }

        .glass-trigger:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.95);
        }

        #homePage { display: block; padding-bottom: 50px; }

        .hero-banner {
            height: 55vh;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 4%;
            transition: 0.3s;
        }

        .hero-title-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .hero-title { font-size: 2.2rem; font-weight: bold; }

        .hero-watch-btn {
            background: var(--netflix-red);
            color: white;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 4px;
            transition: 0.2s;
            cursor: pointer;
        }
        .hero-watch-btn:active { transform: scale(0.9); }

        /* মুভি সেকশন স্টাইল */
        .movie-section { padding: 15px 0 10px 4%; }
        .row-title { 
            font-size: 18px; 
            margin-bottom: 12px; 
            font-weight: 600; 
            color: #fff; 
            display: inline-block;
            cursor: pointer;
        }
        .row-title:active { color: var(--netflix-red); }

        .movie-grid {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 10px 4% 10px 0;
        }

        .movie-card {
            position: relative;
            flex: 0 0 auto;
            width: 115px;
            height: 165px;
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .movie-card:active, .movie-card:hover {
            transform: scale(1.08);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
            z-index: 10;
        }

        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

        .card-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%);
            display: flex; align-items: flex-end; padding: 8px;
        }

        .movie-name {
            font-size: 11px; color: #ffffff; font-weight: 600; text-align: center; width: 100%;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* --- পেজ লেআউট --- */
        #searchPage, #categoryPage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black);
            z-index: 3000;
            padding: 20px;
            overflow-y: auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
            background: #222;
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
        }

        .search-input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-size: 16px;
            margin-left: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .not-found-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .not-found-btn {
            background: var(--netflix-red);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        /* --- ডিটেইলস পেজ --- */
        #detailsPage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black);
            z-index: 2000;
            overflow-y: auto;
        }

        .details-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: 1;
            transition: 0.5s ease;
        }

        #detImg { width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; }

        .img-card-mode { padding: 40px 20px; display: flex; justify-content: center; align-items: flex-start; }
        .img-card-mode #detImg { width: 80%; height: 400px; border: 3px solid white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .img-full-mode { padding: 0; }
        .img-full-mode #detImg { width: 100%; height: 100vh; border: none; border-radius: 0; }

        .scroll-content { position: relative; z-index: 2; padding-top: 500px; }
        .content-inner { background: linear-gradient(to top, var(--black) 90%, transparent); padding: 30px 6%; min-height: 100vh; }
        .det-title { font-size: 32px; font-weight: bold; margin-bottom: 8px; }
        .det-desc { font-size: 14px; color: var(--text-gray); margin-bottom: 20px; line-height: 1.5; }
        #buttonContainer { display: flex; flex-direction: column; gap: 12px; }
        .play-btn { background: white; color: black; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; display: block; width: 100%; }

        @media (min-width: 1024px) {
            .img-card-mode #detImg { width: 350px; height: 500px; }
            .content-inner { width: 50%; }
            .movie-card { width: 160px; height: 230px; }
            .grid-container { grid-template-columns: repeat(6, 1fr); }
        }
    </style>
</head>

        function initHero() {
            const hero = document.getElementById('heroSection');
            hero.style.backgroundImage = `linear-gradient(to top, var(--black), transparent), url('${heroConfig.image}')`;
            document.getElementById('heroTitle').innerText = heroConfig.title;
            document.getElementById('heroWatchBtn').onclick = () => openDetails(heroConfig.title);
        }

        function applyRoute(hashValue) {
            window.location.hash = hashValue ? encodeURIComponent(hashValue) : '';
            checkAndRender();
        }

        function renderHome() {
            initHero();
            const container = document.getElementById('movieContainer');
            const uniqueCategories = [...new Set(allMovies.flatMap(movie => movie.cat))];
            
            container.innerHTML = uniqueCategories.map(cat => `
                <div class="movie-section">
                    <h2 class="row-title" onclick="openCategory('${cat}')">${cat} ›</h2>
                    <div class="movie-grid">
                        ${allMovies.filter(m => m.cat.includes(cat)).map(movie => `
                            <div class="movie-card" onclick="openDetails('${movie.title}')">
                                <img src="${movie.img}">
                                <div class="card-overlay"><span class="movie-name">${movie.title}</span></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function openCategory(catName) { applyRoute(catName); }
        function openSearch() { applyRoute("search"); }
        function openDetails(title) { applyRoute(title); }

        function checkAndRender() {
            const hash = decodeURIComponent(window.location.hash.substring(1));
            
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('categoryPage').style.display = 'none';
            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('detailsPage').style.display = 'none';

            if (hash === "search") {
                document.getElementById('searchPage').style.display = 'block';
                document.getElementById('searchInput').focus();
            } 
            else if (allMovies.some(m => m.title === hash)) {
                const movie = allMovies.find(m => m.title === hash);
                showDetailsUI(movie);
            } 
            else if (allMovies.some(m => m.cat.includes(hash))) {
                showCategoryUI(hash);
            } 
            else {
                document.getElementById('homePage').style.display = 'block';
            }
        }

        function showDetailsUI(movie) {
            document.getElementById('detTitle').innerText = movie.title;
            document.getElementById('detImg').src = movie.img;
            document.getElementById('detDesc').innerText = movie.desc;
            const btnContainer = document.getElementById('buttonContainer');
            btnContainer.innerHTML = movie.links.map(item => `<a href="${item.link}" class="play-btn" target="_blank">${item.text}</a>`).join('');
            document.getElementById('detailsPage').style.display = 'block';
            document.getElementById('wrapper').className = 'details-wrapper img-card-mode';
            document.getElementById('detailsPage').scrollTo(0, 0);
        }

        function showCategoryUI(catName) {
            document.getElementById('categoryTitle').innerText = catName;
            const resultsBox = document.getElementById('categoryResults');
            resultsBox.innerHTML = '';
            allMovies.filter(m => m.cat.includes(catName)).forEach(movie => {
                resultsBox.appendChild(createMovieCard(movie));
            });
            document.getElementById('categoryPage').style.display = 'block';
        }

        function createMovieCard(movie) {
            const div = document.createElement('div');
            div.className = 'movie-card';
            div.style.width = '100%'; 
            div.onclick = () => openDetails(movie.title);
            div.innerHTML = `<img src="${movie.img}"><div class="card-overlay"><span class="movie-name">${movie.title}</span></div>`;
            return div;
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsBox = document.getElementById('searchResults');
            resultsBox.innerHTML = '';
            if (query === "") return;

            // ফিল্টারিং লজিক: শুরুতে থাকা মুভিগুলো আগে আসবে
            const startsWith = allMovies.filter(m => m.title.toLowerCase().startsWith(query));
            const contains = allMovies.filter(m => m.title.toLowerCase().includes(query) && !m.title.toLowerCase().startsWith(query));
            
            const matches = [...startsWith, ...contains];

            if (matches.length > 0) {
                matches.forEach(movie => resultsBox.appendChild(createMovieCard(movie)));
            } else {
                resultsBox.innerHTML = `<div class="not-found-container"><div class="not-found-msg">মুভিটি খুঁজে পাওয়া যাচ্ছে না!</div><a href="https://jusfuka6-bit.github.io/Movie-Request/" target="_blank" class="not-found-btn">মুভিটির সঠিক নাম দিয়ে রিকোয়েস্ট করুন</a></div>`;
            }
        }

        function handleScroll(el) {
            const wrapper = document.getElementById('wrapper');
            wrapper.className = el.scrollTop > 50 ? 'details-wrapper img-full-mode' : 'details-wrapper img-card-mode';
        }

        window.addEventListener('hashchange', checkAndRender);
        renderHome();
        checkAndRender();
    </script>
